# .sops.yaml — recipient pin only; this repo holds ZERO ciphertext, ever
#
# TIN-2360 row (d), DECIDED 2026-07-02: "Zero secrets in this repo, ever."
# That includes ciphertext. No *.enc.*, no sops metadata, no encrypted
# blobs of any kind land in this tree; reviewers reject any diff that
# introduces them. GFTB secret values live blahaj-side under the
# tenants/great-falls-tool-bus/secrets/ sops+age lane, named — names
# only — in secrets.contract.yaml at this repo root.
#
# Why this file exists at all: row (d) requires a DISTINCT age recipient
# for the GFTB tenant (never the shared house recipient). The public
# half of that identity is pinned here (minted 2026-07-02; the private
# half is operator keys.txt custody, named gftb-tenant-age-identity in
# secrets.contract.yaml). A public age recipient is publishable by
# design — this pin is a declaration, not a secret.
#
# The catch-all rule below is a fail-toward-tenant guard: if anyone ever
# runs sops in this repo by mistake, the result is encrypted to the
# tenant recipient (recoverable under operator custody) instead of an ad
# hoc key — and the review rule above still rejects the diff.

creation_rules:
  - path_regex: .*
    age: age1maaym3lt2ttrcml9t75d48025elhz4xmhjefzdxwkkvw4f9yxgsql96r3e
