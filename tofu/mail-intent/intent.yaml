# tofu/mail-intent/intent.yaml — DECLARATIVE mail/list/Anubis intent
#
# TIN-2360 rows (c)/(d)/(e)/(f); prep tracked on TIN-2366.
# This file is intent documentation only. Nothing in this repo applies it.
# Apply authority is the blahaj plane (mail transport, Mailman/HyperKitty,
# Anubis, Cloudflare DNS/tunnel, SOPS secrets). See README.md next to this
# file. No endpoints, no state, no credentials — ever.

version: 1
kind: mail-intent
linear: [TIN-2360, TIN-2366]
applied_by: blahaj # never by this repo

domains:
  - name: latoolb.us
    role: mail
    notes: >-
      DNS redirect/alias + mail domain only (row a); never a second site
      repo. Web traffic 301s to greatfallstoolbus.org. Mail DNS (MX, SPF,
      DKIM, DMARC) follows the manual operator checklist in
      docs/runbooks/dns-mail-checklist.md (row g).
  - name: greatfallstoolbus.org
    role: web
    notes: >-
      Public site domain for this repo. No mailboxes minted on this
      domain in the MVP window.

mailboxes:
  - address: keyholders@latoolb.us
    intent: MailAccount # mail.tinyland.dev/v1alpha1, reconciled blahaj-side
    notes: >-
      First production MailAccount application in the house; coordinate
      with, never absorb, TIN-373 (hello@tinyland.dev). Whether this
      account backs the list's ingest/owner path or stands alone is
      decided in the blahaj-side mail ADR.

lists:
  - name: keyholders
    address: keyholders@latoolb.us
    engine: mailman3
    versions: # pinned trio (row e) — first list-engine deployment in the house
      mailman-core: 3.3.10
      postorius: 1.3.13
      hyperkitty: 1.3.12
    archive:
      engine: hyperkitty
      visibility: public
    notes: >-
      Staged blahaj-side before any announcement; ADR follows blahaj-side
      (row e). Client-facing member/owner instructions are drafted in
      docs/runbooks/keyholders-client-setup.md (draft-until-list-exists).

anubis:
  version: 1.25.0 # first real Techaro Anubis deployment in the house (row f)
  placement: behind-blahaj-cloudflare-tunnel
  policy:
    default: ALLOW
    rules:
      - action: CHALLENGE
        scope: join/contact form route only
  unguarded_surfaces: # explicitly never challenged (row f)
    - hyperkitty public archive
    - /agent
    - /llms.txt
    - all SEO-relevant surfaces
  notes: >-
    Signing key material is named (names-only) in secrets.contract.yaml
    at the repo root; the key itself lives blahaj-side.
