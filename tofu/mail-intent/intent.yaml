# tofu/mail-intent/intent.yaml — DECLARATIVE mail/list/Anubis intent
#
# TIN-2360 rows (c)/(d)/(e)/(f); prep tracked on TIN-2366.
# This file is intent documentation only. Nothing in this repo applies it.
# Apply authority is the org apply-plane overlay great-falls-tool-bus-infra
# (Mailman/HyperKitty, Anubis, Cloudflare DNS/tunnel, SOPS secrets; packet
# 0001 Amendment 1). House services (mail transport relay.tinyland.dev,
# MailAccount CRDs) are substrate consumed by reference. See README.md next
# to this file. No endpoints, no state, no credentials — ever.

version: 1
kind: mail-intent
linear: [TIN-2360, TIN-2366]
applied_by: great-falls-tool-bus-infra # never by this repo

domains:
  - name: latoolb.us
    role: mail
    notes: >-
      DNS redirect/alias + mail domain only (row a); never a second site
      repo. Web traffic 301s to greatfallstoolbus.org. Mail DNS (MX, SPF,
      DKIM, DMARC) follows the manual operator checklist in
      docs/runbooks/dns-mail-checklist.md (row g).
  - name: greatfallstoolbus.org
    role: web
    notes: >-
      Public site domain for this repo. No mailboxes minted on this
      domain in the MVP window.

mailboxes:
  - address: keyholders@latoolb.us
    intent: MailAccount # mail.tinyland.dev/v1alpha1; CR applied from the infra overlay, reconciled by the house mail substrate
    notes: >-
      First production MailAccount application in the house; coordinate
      with, never absorb, TIN-373 (hello@tinyland.dev). The address is now
      the private access-gating role list; list runtime and transport are
      applied from the overlay/substrate, not this public repo.

lists:
  - name: keyholders
    address: keyholders@latoolb.us
    engine: mailman3
    versions: # pinned trio (row e) — first list-engine deployment in the house
      mailman-core: 3.3.10
      postorius: 1.3.13
      hyperkitty: 1.3.12
    archive:
      engine: hyperkitty
      visibility: private
    notes: >-
      Private access-gating role list. Membership is owner-approved,
      non-member access requests may reach the list, and the archive is
      members-only or off.
  - name: discuss
    address: discuss@latoolb.us
    engine: mailman3
    archive:
      engine: hyperkitty
      visibility: public
    notes: >-
      Public/open discussion list. Transport/source reconciliation is live;
      subscribe/post/archive smoke is tracked on TIN-2498 before public site
      copy should promote it.

anubis:
  version: 1.13.0 # digest-pinned Techaro Anubis, both instances below (row f)
  placement: behind-cloudflare-tunnel # edge apply in the infra overlay
  instances:
    - name: forms
      fronts: forms.latoolb.us contact-intake handler (TIN-2420)
      policy:
        default: ALLOW
        rules:
          - action: ALLOW
            scope: /api/contact only (cross-origin JSON fetch() can't solve a browser PoW challenge)
          - action: CHALLENGE
            scope: every other path on the forms hostname (the browsing surface)
    - name: archive (anubis-archive)
      fronts: lists.latoolb.us HyperKitty web tier (TIN-2528)
      policy:
        default: CHALLENGE # pure browsing surface; no API carve-out needed
        rules:
          - action: CHALLENGE
            scope: HyperKitty mbox export path (anti-bulk-export, all user agents)
          - action: ALLOW
            scope: known search-engine crawlers (Googlebot/Bingbot/Qwant)
  unguarded_surfaces: # explicitly never challenged (row f)
    - /agent
    - /llms.txt
    - all SEO-relevant surfaces
  notes: >-
    "discuss-list public archive" was dropped from unguarded_surfaces
    2026-07-06: TIN-2528 added a second, independent Anubis instance
    (anubis-archive) in front of the HyperKitty web tier serving
    lists.latoolb.us, and every human-browser request there IS challenged
    (only allowlisted crawlers pass) — see docs/discuss-archive-packet.md
    in the infra overlay. Signing key material is named (names-only) in
    secrets.contract.yaml at the repo root; the key itself lives in the
    infra overlay's sops lane.
