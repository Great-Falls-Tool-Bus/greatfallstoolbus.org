# Build + push the on-cluster container image to GHCR (TIN-2543).
#
# ACTIVE / BUILD-ONLY. Produces a real adapter-node OCI image on every push to
# main (and on demand via workflow_dispatch) so the on-cluster serve path has a
# concrete artifact to consume. Deliberately scoped to BUILD + PUSH only:
#
#   * The PRODUCTION host is unchanged — adapter-static -> Cloudflare Pages
#     (ADR 0003, DB-less, no edge auth). This workflow never touches production
#     serving; publishing an image does not deploy it.
#   * The default `just build` / CF Pages pipeline still emits adapter-static.
#     Only ADAPTER=node (set by the image recipe) selects adapter-node.
#   * The image is consumed by great-falls-tool-bus-infra (blahaj), which owns
#     DNS, Access, Tunnel, and any actual deploy/cutover. This repo never holds
#     edge/apply creds and never flips the live host.
#
# RUNNER CLASS (TIN-2543 fix): GFTB's ARC pool advertises only the shared
# `tinyland-nix` GloriousFlywheel runner — there is NO `tinyland-dind`/buildx
# runner in this org, so the previous `runs-on: tinyland-dind` had no runner and
# the image build could never start. This workflow now mirrors the
# great-falls-tool-bus-infra *-crs.yml pattern EXACTLY: it runs on `tinyland-nix`
# through ./GloriousFlywheel/.github/actions/nix-job and builds the OCI image
# DAEMONLESS via Nix (nix/oci-image.nix -> dockerTools.streamLayeredImage) +
# skopeo push. No Docker daemon, no buildx. The GloriousFlywheel shared cache
# accelerates the SvelteKit build inputs; the image push itself is NOT
# remote-execution eligible (`container-image-and-push` is blocked at the GF
# manifest layer — see docs/CI-SCHEMA.md §5 and the flywheel skill's rule 8).
#
# CREDENTIALS (public-repo-safe, switchable): no cache/executor endpoint, token,
# or UUID is committed. GF-core is checked out with GF_CORE_DEPLOY_KEY if that
# org secret is present, else GF_CORE_READ_TOKEN, else the job fails fast with a
# clear message (never a silent no-op). The image push uses only the ambient
# GITHUB_TOKEN (packages: write) — NO new secret.

name: Build Container (GHCR)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: container-ghcr-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  GF_CORE_REF: 2281b576bce0e8dd776a047b84e7464f5b508a62
  HAS_GF_CORE_DEPLOY_KEY: ${{ secrets.GF_CORE_DEPLOY_KEY != '' }}
  HAS_GF_CORE_READ_TOKEN: ${{ secrets.GF_CORE_READ_TOKEN != '' }}

jobs:
  build-push:
    name: Build + push adapter-node image (daemonless nix)
    runs-on: tinyland-nix
    steps:
      - name: Check GloriousFlywheel core credential
        id: gfcore
        run: |
          # Credential-gated activation: the adapter-node image build needs a
          # read credential to check out the private GloriousFlywheel core. When
          # neither secret is present the build is not yet activated for this
          # repo, so SKIP it with a notice (keeps main green) rather than failing.
          # Provision GF_CORE_DEPLOY_KEY (or GF_CORE_READ_TOKEN) and the build
          # auto-activates on the next push, no workflow edit required.
          if [[ "${HAS_GF_CORE_DEPLOY_KEY}" == "true" || "${HAS_GF_CORE_READ_TOKEN}" == "true" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::GF_CORE_DEPLOY_KEY / GF_CORE_READ_TOKEN not provisioned; skipping the adapter-node image build. Add the secret to activate it."
          fi
      - name: Checkout overlay
        uses: actions/checkout@v6
        with:
          path: overlay
      - name: Checkout GloriousFlywheel core with deploy key
        if: env.HAS_GF_CORE_DEPLOY_KEY == 'true'
        uses: actions/checkout@v6
        with:
          repository: tinyland-inc/GloriousFlywheel
          ref: ${{ env.GF_CORE_REF }}
          path: GloriousFlywheel
          ssh-key: ${{ secrets.GF_CORE_DEPLOY_KEY }}
      - name: Checkout GloriousFlywheel core with read token
        if: env.HAS_GF_CORE_DEPLOY_KEY != 'true' && env.HAS_GF_CORE_READ_TOKEN == 'true'
        uses: actions/checkout@v6
        with:
          repository: tinyland-inc/GloriousFlywheel
          ref: ${{ env.GF_CORE_REF }}
          path: GloriousFlywheel
          token: ${{ secrets.GF_CORE_READ_TOKEN }}
      - name: Build + push adapter-node image
        if: steps.gfcore.outputs.available == 'true'
        uses: ./GloriousFlywheel/.github/actions/nix-job
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_REF: ghcr.io/${{ github.repository_owner }}/greatfallstoolbus.org
          BUILD_COMMIT_SHA: ${{ github.sha }}
          BUILD_COMMIT_REF: ${{ github.ref_name }}
          BUILD_DATE: ${{ github.event.repository.updated_at }}
        with:
          # PR-branch / non-trusted lane: read the shared cache to accelerate the
          # SvelteKit build inputs, but never WRITE it (GF_BAZEL_REMOTE_UPLOAD
          # stays false). Cache-write is a trusted default-branch concern.
          push-cache: 'false'
          command: |
            set -euo pipefail
            cd overlay
            export GF_CORE_PATH=../GloriousFlywheel
            export GF_CORE_CI_PATH=../GloriousFlywheel#ci
            nix develop ../GloriousFlywheel#ci -c just container-image-publish
