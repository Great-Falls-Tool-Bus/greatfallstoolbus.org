# Build + push the on-cluster container image to GHCR (TIN-2543).
#
# ACTIVE / BUILD-ONLY. Produces a real adapter-node OCI image on every push to
# main (and on demand via workflow_dispatch) so the on-cluster serve path has a
# concrete artifact to consume. Deliberately scoped to BUILD + PUSH only:
#
#   * The PRODUCTION host is unchanged — adapter-static -> Cloudflare Pages
#     (ADR 0003, DB-less, no edge auth). This workflow never touches production
#     serving; publishing an image does not deploy it.
#   * The default `just build` / CF Pages pipeline still emits adapter-static.
#     Only ADAPTER=node (set by the image recipe) selects adapter-node.
#   * The image is consumed by great-falls-tool-bus-infra (blahaj), which owns
#     DNS, Access, Tunnel, and any actual deploy/cutover. This repo never holds
#     edge/apply creds and never flips the live host.
#
# RUNNER CLASS (TIN-2543 fix): GFTB's ARC pool advertises only the shared
# `tinyland-nix` GloriousFlywheel runner — there is NO `tinyland-dind`/buildx
# runner in this org, so the previous `runs-on: tinyland-dind` had no runner and
# the image build could never start. This workflow now mirrors the
# great-falls-tool-bus-infra *-crs.yml pattern EXACTLY: it runs on `tinyland-nix`
# through ./GloriousFlywheel/.github/actions/nix-job and builds the OCI image
# DAEMONLESS via nix2container (flake `.#image` -> the n2c-patched skopeo
# copyToRegistry; nix/oci-image.nix stays the nixpkgs-only fallback). No Docker
# daemon, no buildx. The GloriousFlywheel shared cache
# accelerates the SvelteKit build inputs; the image push itself is NOT
# remote-execution eligible (`container-image-and-push` is blocked at the GF
# manifest layer — see docs/CI-SCHEMA.md §5 and the flywheel skill's rule 8).
#
# CREDENTIALS (public-repo-safe, switchable): no cache/executor endpoint, token,
# or UUID is committed. GF-core is checked out with GF_CORE_DEPLOY_KEY if that
# org secret is present, else GF_CORE_READ_TOKEN, else the job fails fast with a
# clear message (never a silent no-op). The image push uses only the ambient
# GITHUB_TOKEN (packages: write) — NO new secret.

name: Build Container (GHCR)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: container-ghcr-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  GF_CORE_REF: 2281b576bce0e8dd776a047b84e7464f5b508a62
  HAS_GF_CORE_DEPLOY_KEY: ${{ secrets.GF_CORE_DEPLOY_KEY != '' }}
  HAS_GF_CORE_READ_TOKEN: ${{ secrets.GF_CORE_READ_TOKEN != '' }}

jobs:
  build-push:
    name: Build + push adapter-node image (daemonless nix)
    runs-on: tinyland-nix
    outputs:
      # 'true' only when the GF-core credential gate activated the build (image
      # was actually built + pushed). The signal-cd job below deploys ONLY when
      # this is 'true', so a credential-gated no-op never dispatches a deploy.
      published: ${{ steps.gfcore.outputs.available }}
    steps:
      - name: Check GloriousFlywheel core credential
        id: gfcore
        run: |
          # Credential-gated activation: the adapter-node image build needs a
          # read credential to check out the private GloriousFlywheel core. When
          # neither secret is present the build is not yet activated for this
          # repo, so SKIP it with a notice (keeps main green) rather than failing.
          # Provision GF_CORE_DEPLOY_KEY (or GF_CORE_READ_TOKEN) and the build
          # auto-activates on the next push, no workflow edit required.
          if [[ "${HAS_GF_CORE_DEPLOY_KEY}" == "true" || "${HAS_GF_CORE_READ_TOKEN}" == "true" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::GF_CORE_DEPLOY_KEY / GF_CORE_READ_TOKEN not provisioned; skipping the adapter-node image build. Add the secret to activate it."
          fi
      - name: Checkout overlay
        uses: actions/checkout@v7
        with:
          path: overlay
      - name: Checkout GloriousFlywheel core with deploy key
        if: env.HAS_GF_CORE_DEPLOY_KEY == 'true'
        uses: actions/checkout@v7
        with:
          repository: tinyland-inc/GloriousFlywheel
          ref: ${{ env.GF_CORE_REF }}
          path: GloriousFlywheel
          ssh-key: ${{ secrets.GF_CORE_DEPLOY_KEY }}
      - name: Checkout GloriousFlywheel core with read token
        if: env.HAS_GF_CORE_DEPLOY_KEY != 'true' && env.HAS_GF_CORE_READ_TOKEN == 'true'
        uses: actions/checkout@v7
        with:
          repository: tinyland-inc/GloriousFlywheel
          ref: ${{ env.GF_CORE_REF }}
          path: GloriousFlywheel
          token: ${{ secrets.GF_CORE_READ_TOKEN }}
      - name: Build + push adapter-node image
        if: steps.gfcore.outputs.available == 'true'
        uses: ./GloriousFlywheel/.github/actions/nix-job
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_REF: ghcr.io/${{ github.repository_owner }}/greatfallstoolbus.org
          BUILD_COMMIT_SHA: ${{ github.sha }}
          BUILD_COMMIT_REF: ${{ github.ref_name }}
          BUILD_DATE: ${{ github.event.repository.updated_at }}
        with:
          # PR-branch / non-trusted lane: read the shared cache to accelerate the
          # SvelteKit build inputs, but never WRITE it (GF_BAZEL_REMOTE_UPLOAD
          # stays false). Cache-write is a trusted default-branch concern.
          push-cache: 'false'
          command: |
            set -euo pipefail
            cd overlay
            export GF_CORE_PATH=../GloriousFlywheel
            export GF_CORE_CI_PATH=../GloriousFlywheel#ci
            nix develop ../GloriousFlywheel#ci -c just container-image-publish

  # CONTINUOUS DEPLOYMENT SIGNAL (merge-on-green == live). This repo SIGNALS; the
  # infra repo APPLIES. After a green main image build+push, resolve the pushed
  # @sha256 digest and fire a repository_dispatch (web-image-published) to
  # great-falls-tool-bus-infra, whose web-stack.yml re-verifies CI-green and then
  # applies. The security boundary is unchanged: this public repo still holds NO
  # cluster/edge creds — only a cross-repo dispatch token. FAIL-SOFT: if
  # INFRA_CD_DISPATCH_TOKEN is absent the job skips with a ::notice:: (same idiom
  # as the GF-core credential gate above), so main stays green until the operator
  # provisions the token; manual web-stack dispatch remains the deploy path.
  signal-cd:
    name: Signal infra CD (repository_dispatch)
    needs: build-push
    # Only a real, freshly-pushed main image signals a deploy: main ref + the
    # build job succeeded AND actually published (credential gate was active).
    if: >-
      github.ref == 'refs/heads/main' &&
      needs.build-push.result == 'success' &&
      needs.build-push.outputs.published == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Resolve pushed digest + dispatch deploy signal (fail-soft on absent token)
        env:
          INFRA_CD_DISPATCH_TOKEN: ${{ secrets.INFRA_CD_DISPATCH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [[ -z "${INFRA_CD_DISPATCH_TOKEN:-}" ]]; then
            echo "::notice::INFRA_CD_DISPATCH_TOKEN not provisioned; skipping the infra CD signal (fail-soft). Continuous deployment stays inert until the operator adds the token — manual great-falls-tool-bus-infra web-stack dispatch remains the deploy path."
            exit 0
          fi

          owner_lc="$(printf '%s' "${OWNER}" | tr '[:upper:]' '[:lower:]')"
          image_ref="ghcr.io/${owner_lc}/greatfallstoolbus.org"
          tag="sha-${COMMIT_SHA}"

          # Resolve the @sha256 digest just pushed for ${tag}. Primary: the GHCR
          # registry manifest (strongly consistent immediately after the push).
          # Fallback: the GH package-versions API. Both read-only, ambient
          # GITHUB_TOKEN (packages:read).
          resolve_via_registry() {
            local bearer
            bearer="$(printf '%s' "${GITHUB_TOKEN}" | base64 | tr -d '\n')"
            curl -sSL -o /dev/null -D - \
              -H "Authorization: Bearer ${bearer}" \
              -H "Accept: application/vnd.oci.image.index.v1+json" \
              -H "Accept: application/vnd.oci.image.manifest.v1+json" \
              -H "Accept: application/vnd.docker.distribution.manifest.v2+json" \
              -H "Accept: application/vnd.docker.distribution.manifest.list.v2+json" \
              "https://ghcr.io/v2/${owner_lc}/greatfallstoolbus.org/manifests/${tag}" \
              | tr -d '\r' | awk -F': ' 'tolower($1)=="docker-content-digest"{print $2}'
          }
          resolve_via_api() {
            GH_TOKEN="${GITHUB_TOKEN}" gh api \
              "orgs/${OWNER}/packages/container/greatfallstoolbus.org/versions?per_page=100" \
              --jq "[.[] | select(.metadata.container.tags[]? == \"${tag}\")][0].name // \"\"" 2>/dev/null || true
          }

          digest=""
          for attempt in 1 2 3 4 5; do
            digest="$(resolve_via_registry || true)"
            [[ -n "${digest}" ]] && break
            digest="$(resolve_via_api || true)"
            [[ -n "${digest}" ]] && break
            echo "digest not resolvable yet for ${image_ref}:${tag} (attempt ${attempt}); retrying..."
            sleep 6
          done

          if [[ -z "${digest}" ]]; then
            echo "::error::could not resolve the @sha256 digest for ${image_ref}:${tag} from GHCR; the build reported success but the digest is not queryable. Not dispatching a deploy."
            exit 1
          fi

          image="${image_ref}@${digest}"
          echo "Resolved pushed image: ${image}"

          # Build the nested client_payload as JSON (unambiguous) and POST the
          # repository_dispatch using the cross-repo token (contents:write on the
          # infra repo). event_type + client_payload contract must match
          # great-falls-tool-bus-infra web-stack.yml.
          payload="$(jq -n \
            --arg image "${image}" \
            --arg sha "${COMMIT_SHA}" \
            --arg replicas "2" \
            '{event_type:"web-image-published", client_payload:{image:$image, sha:$sha, replicas:$replicas}}')"

          printf '%s' "${payload}" | GH_TOKEN="${INFRA_CD_DISPATCH_TOKEN}" gh api \
            -X POST "repos/${OWNER}/great-falls-tool-bus-infra/dispatches" --input -

          echo "::notice::Signaled great-falls-tool-bus-infra (web-image-published) to deploy ${image} for ${COMMIT_SHA}. The infra CD path re-checks CI-green before applying."
