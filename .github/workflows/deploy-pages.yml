# Serving: Cloudflare Pages (ADR 0003, operator-approved 2026-07-03).
# This repo intentionally consumes the shared ci-templates Cloudflare Pages lane
# instead of carrying a hand-rolled wrangler workflow.
#
# base='' (root): CF Pages serves the custom domain at root; svelte.config.js
# defaults base to '' when BASE_PATH is unset, so no BASE_PATH is set here.
# The reusable deploy step skips gracefully when the org CF secrets are absent.
# PR builds never deploy and never mutate repo settings.
name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    permissions:
      contents: read
      deployments: write
    uses: tinyland-inc/ci-templates/.github/workflows/spoke-deploy-cloudflare-pages.yml@v2.10.0
    secrets: inherit
