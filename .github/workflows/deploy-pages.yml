# Serving: Cloudflare Pages (ADR 0003, operator-approved 2026-07-03).
# This repo intentionally consumes the shared ci-templates Cloudflare Pages lane
# instead of carrying a hand-rolled wrangler workflow.
#
# base='' (root): CF Pages serves the custom domain at root; svelte.config.js
# defaults base to '' when BASE_PATH is unset, so no BASE_PATH is set here.
# The reusable deploy step skips gracefully when the org CF secrets are absent.
# PR builds never deploy and never mutate repo settings.
name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    permissions:
      contents: read
      deployments: write
    uses: tinyland-inc/ci-templates/.github/workflows/spoke-deploy-cloudflare-pages.yml@v2.10.0
    # Archive surfacing per branch. The `dev` shadow deploy builds with
    # PUBLIC_ARCHIVE_PREVIEW (gated Access testing on dev.*.pages.dev); `main`
    # (prod) builds with PUBLIC_ARCHIVE_LIVE — the public go-live switch — now
    # that the discuss@latoolb.us archive is live at lists.latoolb.us (TIN-2528,
    # verified: public discuss@ reachable, private keyholders@ denied). Both flip
    # `archiveVisible` on, surfacing /discuss + its nav entry (see
    # src/lib/flags.ts: archiveVisible = live OR preview). The lane runs
    # `nix develop --command <build_command>`, so we wrap the env in `sh -c`. A
    # proper `build_env` input on the shared deploy lane is the product-clean fix
    # (tracked as a TIN-2547 sub-case); this is the interim consumer-side wiring.
    with:
      build_command: ${{ github.ref_name == 'dev' && 'sh -c "PUBLIC_ARCHIVE_PREVIEW=true just build"' || github.ref_name == 'main' && 'sh -c "PUBLIC_ARCHIVE_LIVE=true just build"' || 'just build' }}
    # Pass the CF credentials EXPLICITLY, not via `secrets: inherit`. The
    # reusable workflow lives in a different org (tinyland-inc) than this repo
    # (Great-Falls-Tool-Bus); `inherit` did not deliver these repo secrets
    # cross-org, so the deploy step silently no-op'd ("Skipping ... not
    # configured") on every push while the build stayed green. Explicit mapping
    # of the declared optional secrets is the reliable form.
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
