# Serving: Cloudflare Pages (ADR 0003, operator-approved 2026-07-03).
# Replaces the former GitHub-Pages deploy (domain-readiness probe + dual
# BASE_PATH build + cname-clear), which self-unbound the custom domain on every
# main push while the apex is Access-gated. The prior GH-Pages workflow is the
# documented rollback publisher, retrievable from git history.
#
# base='' (root): CF Pages serves the custom domain at root; svelte.config.js
# defaults base to '' when BASE_PATH is unset, so no BASE_PATH is set here.
# The deploy step SKIPS gracefully when the org CF secrets are absent, so this
# merges safely before the token is minted. PR builds never deploy and never
# mutate repo settings.
name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      # cloudflare/wrangler-action installs Wrangler with pnpm when it is not
      # already present on PATH. The Nix devshell keeps pnpm inside
      # `nix develop --command`, so expose the same pinned pnpm to the host
      # action environment before invoking wrangler-action.
      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
          run_install: false

      - name: Install workspace dependencies
        run: nix develop --command just setup

      - name: Check static site
        run: nix develop --command just check

      - name: Build static site
        run: nix develop --command just build

      - name: Resolve Cloudflare Pages target
        id: cloudflare
        env:
          RAW_BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          site="${GITHUB_REPOSITORY#*/}"
          project="${site//./-}"
          project="${project//_/-}"
          branch="${RAW_BRANCH:-main}"
          branch="$(printf '%s' "$branch" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//')"
          echo "project=$project" >> "$GITHUB_OUTPUT"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Check Cloudflare Pages credentials
        id: cloudflare_credentials
        if: github.event_name != 'pull_request'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ] && [ -n "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "can_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Skipping Cloudflare Pages deploy because CLOUDFLARE_API_TOKEN or CLOUDFLARE_ACCOUNT_ID is not configured."
            echo "can_deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy static site
        if: github.event_name != 'pull_request' && steps.cloudflare_credentials.outputs.can_deploy == 'true'
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy build --project-name=${{ steps.cloudflare.outputs.project }} --branch=${{ steps.cloudflare.outputs.branch }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
