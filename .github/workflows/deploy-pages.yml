name: Deploy to GitHub Pages

# House DEFAULT deploy lane (see AGENTS.md -> "Build target"): adapter-static -> GitHub Pages.
# This spoke is custom-domain hosted at https://greatfallstoolbus.org/.
# static/CNAME carries the domain and BASE_PATH="" keeps emitted asset URLs root-relative.
# Cloudflare Pages is a documented opt-in: docs/deploy/cloudflare-pages.md.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Install workspace dependencies
        run: nix develop --command just setup

      - name: Check static site
        run: nix develop --command just check

      - name: Build static site (custom-domain root base)
        run: nix develop --command just build
        env:
          NODE_ENV: production
          BASE_PATH: ''

      - uses: actions/upload-pages-artifact@v5
        with:
          path: build

  pages-domain-ready:
    name: Pages custom domain ready
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.dns.outputs.ready }}
    steps:
      - name: Check apex DNS
        id: dns
        env:
          PAGES_DOMAIN: greatfallstoolbus.org
        run: |
          python3 - <<'PY'
          import os
          import socket

          domain = os.environ["PAGES_DOMAIN"]
          try:
              answers = socket.getaddrinfo(domain, 443, type=socket.SOCK_STREAM)
          except socket.gaierror:
              answers = []

          ips = sorted({answer[4][0] for answer in answers})
          ready = "true" if ips else "false"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"ready={ready}\n")

          if ready == "true":
              print(f"{domain} resolves: {', '.join(ips)}")
          else:
              print(f"{domain} has no public A/AAAA records yet; skipping Pages deploy")
          PY

  deploy:
    name: Deploy to GitHub Pages
    needs: [build, pages-domain-ready]
    if: github.event_name != 'pull_request' && needs.pages-domain-ready.outputs.ready == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v5
        id: deployment
