# secrets.contract.yaml — names-only public secrets contract
#
# TIN-2360 row (d), DECIDED 2026-07-02: "Zero secrets in this repo, ever —
# a names-only secrets.contract.yaml is the public surface."
#
# This file records WHICH secrets the GFTB mail/list/Anubis plane needs,
# WHERE each one lives, and WHO owns rotation. It never records values,
# hostnames, endpoints, ciphertext, or key material of any kind. If a
# diff to this file contains anything that looks like a value, reject it.
#
# Plane vocabulary:
#   gftb-infra-sops — sops+age material in the org apply-plane overlay,
#     Great-Falls-Tool-Bus/great-falls-tool-bus-infra, under its
#     secrets/ lane (that repo's .sops.yaml pins the creation rule).
#     Row (d) requires a DISTINCT age recipient for GFTB ciphertext.
#     That recipient was minted 2026-07-02: the public half is pinned in
#     the infra overlay's .sops.yaml; the private half is operator
#     keys.txt custody (gftb-tenant-age-identity below). Per this file's
#     posture the recipient string itself is not repeated here.
#     (Packet 0001 Amendment 1 / memo 0002: this plane supersedes the
#     previously named blahaj-tenants-sops lane — blahaj is replaceable
#     substrate consumed by reference and takes no GFTB content.)
#   gh-environment — protected GitHub *environment* secret on this repo
#     (never a repository secret; row d). Reserved for CI decrypt if that
#     is ever needed; unused today.

version: 1
repo: Great-Falls-Tool-Bus/greatfallstoolbus.org
linear: [TIN-2360, TIN-2366]
posture: names-only # no values, no hostnames, no key material — ever

secrets:
  - name: latoolbus-dkim-private-key
    purpose: >-
      DKIM signing key for outbound mail from latoolb.us (selector chosen
      apply-plane-side in the infra overlay; only the public TXT record is
      ever published, via the manual DNS checklist in
      docs/runbooks/dns-mail-checklist.md).
    plane: gftb-infra-sops
    rotation: >-
      Effectively unrotatable once DNS-pinned (row d): rotation means
      minting a NEW selector + key pair, publishing the new public TXT,
      then retiring the old selector. Because age has no revocation, the
      private key must never appear as public ciphertext anywhere — not
      even encrypted — outside the gftb-infra-sops plane.
    owner: Jess

  - name: gftb-tenant-age-identity
    purpose: >-
      The age identity (secret half) whose recipient id is pinned for the
      secrets/ lane in great-falls-tool-bus-infra's .sops.yaml (minted
      2026-07-02). Everything else in this contract is encrypted to that
      recipient.
    plane: gftb-infra-sops
    rotation: >-
      Operator-held (sops age keys.txt custody). Rotation = add new
      recipient to the infra overlay's .sops.yaml rule, updatekeys on all
      GFTB ciphertext, then remove the old recipient. If CI decrypt is
      ever required, the identity is exposed to CI only through a
      protected GitHub environment secret (plane gh-environment), never a
      repository secret and never a file in this repo.
    owner: Jess

  - name: gftb-mailman-admin-password
    purpose: >-
      Mailman 3 / Postorius / Django admin superuser password (and the
      paired REST API credential) for the keyholders list deployment
      (pinned trio Mailman 3.3.10 / Postorius 1.3.13 / HyperKitty 1.3.12;
      TIN-2360 row e).
    plane: gftb-infra-sops
    rotation: >-
      Freely rotatable; rotate on operator turnover or suspected
      exposure. Runtime consumption is apply-plane-side only (infra
      overlay), never this repo.
    owner: Jess

  - name: gftb-anubis-ed25519-signing-key
    purpose: >-
      ED25519 private key Anubis v1.25.0 uses to sign issued challenge
      cookies for the join/contact form route (TIN-2360 row f; single
      CHALLENGE rule, default-allow everywhere else, behind the
      Cloudflare tunnel — edge apply in the infra overlay).
    plane: gftb-infra-sops
    rotation: >-
      Freely rotatable; rotating invalidates outstanding challenge
      cookies, which only forces visitors to re-solve the form challenge.
    owner: Jess

  - name: gftb-smtp-relay-credentials
    purpose: >-
      Conditional — SMTP submission credentials for the list engine's
      outbound path IF the overlay-side Mailman deployment submits through
      an authenticated relay rather than the house transport. Marked
      here so the name is reserved either way; the overlay's mail ADR
      decides whether this entry is needed at all.
    plane: gftb-infra-sops
    rotation: >-
      Freely rotatable if minted; scoped to list-engine submission only.
    owner: Jess
